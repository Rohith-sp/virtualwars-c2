# Firebase App Hosting backend configuration
# See: https://firebase.google.com/docs/app-hosting/configure

runConfig:
  concurrency: 100
  cpu: 1
  memoryMiB: 512
  minInstances: 0
  maxInstances: 5

env:
  - variable: ALLOWED_ORIGIN
    value: https://voteguide-india-320d6.web.app
    availability:
      - BUILD
      - RUNTIME

  - variable: GEMINI_API_KEY
    secret: GEMINI_API_KEY

  - variable: GEMINI_API_KEY_2
    secret: GEMINI_API_KEY_2

  - variable: GROQ_API_KEY
    secret: GROQ_API_KEY
